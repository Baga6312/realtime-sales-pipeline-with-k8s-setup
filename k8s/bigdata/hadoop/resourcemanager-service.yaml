apiVersion: v1
kind: Service
metadata:
  name: resourcemanager
  namespace: bigdata
spec:
  selector:
    app: resourcemanager
  ports:
    - name: web
      port: 8088
      targetPort: 8088
    - name: scheduler
      port: 8030
      targetPort: 8030
    - name: resource-tracker
      port: 8031
      targetPort: 8031
    - name: admin
      port: 8033
      targetPort: 8033
  type: ClusterIP