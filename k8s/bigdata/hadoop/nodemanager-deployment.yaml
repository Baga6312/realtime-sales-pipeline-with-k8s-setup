apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodemanager
  namespace: bigdata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodemanager
  template:
    metadata:
      labels:
        app: nodemanager
    spec:
      containers:
        - name: nodemanager
          image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
          envFrom:
            - configMapRef:
                name: hadoop-config