# Allow traffic within bigdata namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bigdata-internal
  namespace: bigdata
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow wordpress to reach postgres in bigdata namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wordpress-to-postgres
  namespace: bigdata
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordpress
---
# WordPress namespace policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wordpress-internal
  namespace: wordpress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bigdata
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP