apiVersion: v1
kind: ServiceAccount
metadata:
  name: bigdata-sa
  namespace: bigdata
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bigdata-role
  namespace: bigdata
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bigdata-rolebinding
  namespace: bigdata
subjects:
  - kind: ServiceAccount
    name: bigdata-sa
    namespace: bigdata
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: bigdata-role
---
