apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark
  namespace: bigdata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
  template:
    metadata:
      labels:
        app: spark
    spec:
      serviceAccountName: bigdata-sa
      containers:
        - name: spark
          image: spark-bigdata:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4040
            - containerPort: 8080
            - containerPort: 10001
            - containerPort: 8888
          env:
            - name: HOME
              value: /root
            - name: HADOOP_CONF_DIR
              value: /etc/hadoop
            - name: YARN_CONF_DIR
              value: /etc/hadoop
          volumeMounts:
            - name: notebooks
              mountPath: /notebooks
          livenessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: notebooks
          persistentVolumeClaim:
            claimName: notebooks-pvc