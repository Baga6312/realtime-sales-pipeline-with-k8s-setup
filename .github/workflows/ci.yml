name: CI - Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'spark/**'
      - 'wordpress/**'

jobs:
  build-spark:
    name: Build Spark Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Spark
        uses: docker/build-push-action@v5
        with:
          context: ./spark
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spark-bigdata:latest

  build-wordpress:
    name: Build WordPress Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push WordPress
        uses: docker/build-push-action@v5
        with:
          context: ./wordpress
          file: ./wordpress/Dockerfile-wordpress
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-bigdata:latest

  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [build-spark, build-wordpress]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Spark image in deployment
        run: |
          sed -i "s|image: .*/spark-bigdata:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/spark-bigdata:latest|g" \
            k8s/bigdata/spark/deployment.yaml

      - name: Update WordPress image in deployment
        run: |
          sed -i "s|image: .*/wordpress-bigdata:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/wordpress-bigdata:latest|g" \
            k8s/wordpress/deployment.yaml

      - name: Commit and push updated manifests
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add k8s/
          git commit -m "ci: update image tags [skip ci]" || exit 0
          git push